name: Feature request
description: Suggest an improvement for Atlas.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Usage
        - Sessions
        - Git Activity
        - Providers
        - Menu bar
        - Notch Island
        - Release or updates
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or constraints if useful.
