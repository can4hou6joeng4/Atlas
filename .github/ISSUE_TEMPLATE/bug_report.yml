name: Bug report
description: Report a reproducible Atlas problem.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, including provider, view, and local build path if relevant.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Atlas version or commit
      placeholder: "v1.2.0 or commit SHA"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.5"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Drag screenshots, recordings, or relevant logs here.
      render: shell
